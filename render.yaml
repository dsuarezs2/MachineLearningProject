services:
  - type: web
    name: cardioinsight-ai
    env: python
    buildCommand: pip install -r requirements.txt && python train.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Or whatever standard version they support, Render will use this version
